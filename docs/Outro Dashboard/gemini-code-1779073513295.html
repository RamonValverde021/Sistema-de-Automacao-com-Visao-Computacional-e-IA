<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA | Supervisório de Classificação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1, h2, h3, .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* Efeitos Glow Industriais */
        .glow-panel {
            background: rgba(16, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.05), inset 0 0 20px rgba(0, 240, 255, 0.02);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .glow-panel:hover {
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .text-glow-cyan { text-shadow: 0 0 10px rgba(0, 240, 255, 0.7); color: #00f0ff; }
        .text-glow-green { text-shadow: 0 0 10px rgba(0, 255, 102, 0.7); color: #00ff66; }
        .text-glow-orange { text-shadow: 0 0 10px rgba(255, 94, 0, 0.7); color: #ff5e00; }
        .text-glow-red { text-shadow: 0 0 10px rgba(255, 0, 60, 0.7); color: #ff003c; }

        /* Indicador Pulsante */
        .status-pulse {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        /* Custom Scrollbar para o Log */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col">

    <!-- Cabeçalho -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-4 border-b border-cyan-500/30">
        <div class="flex items-center gap-4 mb-4 md:mb-0">
            <i class="fa-solid fa-microchip text-4xl text-glow-cyan"></i>
            <div>
                <h1 class="text-2xl md:text-3xl font-bold tracking-wider text-white">SYS<span class="text-glow-cyan">VISION</span> 4.0</h1>
                <p class="text-cyan-500/70 text-sm tracking-widest">MONITORAMENTO DE ESTEIRA AUTOMATIZADA</p>
            </div>
        </div>
        <div class="flex items-center gap-3 glow-panel px-4 py-2">
            <div id="connection-dot" class="w-3 h-3 rounded-full bg-green-500 status-pulse"></div>
            <span id="connection-text" class="text-sm font-bold text-glow-green tracking-wider uppercase">Conectado ao Python</span>
        </div>
    </header>

    <!-- Grid Principal -->
    <main class="flex-grow grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
        
        <!-- Status Geral da Esteira -->
        <div class="glow-panel p-6 xl:col-span-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="p-4 bg-gray-800/50 rounded-full border border-gray-700">
                    <i class="fa-solid fa-cogs text-3xl text-gray-400" id="gear-icon"></i>
                </div>
                <div>
                    <h2 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-1">Status da Esteira</h2>
                    <div id="belt-status" class="text-2xl font-orbitron font-bold text-glow-green">PROCESSANDO</div>
                </div>
            </div>
            <div class="text-center md:text-right">
                <h2 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-1">Taxa de Detecção</h2>
                <div class="text-3xl font-orbitron font-bold text-white"><span id="detection-rate">0</span> <span class="text-sm text-cyan-500">un/min</span></div>
            </div>
        </div>

        <!-- Cards de Contagem -->
        <div class="glow-panel p-6 flex items-center justify-between relative overflow-hidden">
            <div class="absolute -right-6 -top-6 opacity-5"><i class="fa-solid fa-bottle-water text-9xl"></i></div>
            <div class="z-10">
                <h3 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-2">Coca-Cola</h3>
                <div class="text-4xl font-orbitron font-bold text-white" id="count-coca">0</div>
            </div>
            <i class="fa-solid fa-bottle-water text-3xl text-red-500 z-10"></i>
        </div>

        <div class="glow-panel p-6 flex items-center justify-between relative overflow-hidden">
            <div class="absolute -right-6 -top-6 opacity-5"><i class="fa-solid fa-bottle-water text-9xl"></i></div>
            <div class="z-10">
                <h3 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-2">Fanta</h3>
                <div class="text-4xl font-orbitron font-bold text-white" id="count-fanta">0</div>
            </div>
            <i class="fa-solid fa-bottle-water text-3xl text-orange-500 z-10"></i>
        </div>

        <div class="glow-panel p-6 flex items-center justify-between relative overflow-hidden">
            <div class="absolute -right-6 -top-6 opacity-5"><i class="fa-solid fa-bottle-water text-9xl"></i></div>
            <div class="z-10">
                <h3 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-2">Sprite</h3>
                <div class="text-4xl font-orbitron font-bold text-white" id="count-sprite">0</div>
            </div>
            <i class="fa-solid fa-bottle-water text-3xl text-green-500 z-10"></i>
        </div>

        <div class="glow-panel p-6 flex items-center justify-between relative overflow-hidden border-red-500/30">
            <div class="absolute -right-6 -top-6 opacity-5"><i class="fa-solid fa-triangle-exclamation text-9xl"></i></div>
            <div class="z-10">
                <h3 class="text-red-400 text-sm uppercase font-bold tracking-widest mb-2">Erros / Descarte</h3>
                <div class="text-4xl font-orbitron font-bold text-glow-red" id="count-error">0</div>
            </div>
            <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500 z-10"></i>
        </div>

        <!-- Gráfico em Tempo Real -->
        <div class="glow-panel p-6 xl:col-span-3">
            <h3 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-4 flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-cyan-500"></i> Fluxo de Processamento (Tempo Real)
            </h3>
            <div class="h-64 w-full">
                <canvas id="rateChart"></canvas>
            </div>
        </div>

        <!-- Log de Identificação -->
        <div class="glow-panel p-6 xl:col-span-1 flex flex-col">
            <h3 class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list-check text-cyan-500"></i> Últimas Leituras
            </h3>
            <div id="log-container" class="flex-grow overflow-y-auto space-y-2 pr-2 h-64">
                <!-- Logs injetados via JS -->
            </div>
        </div>

    </main>

    <script>
        // --- Configuração do Gráfico (Chart.js) ---
        const ctx = document.getElementById('rateChart').getContext('2d');
        const rateChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(15).fill(''),
                datasets: [{
                    label: 'Garrafas por Minuto',
                    data: Array(15).fill(0),
                    borderColor: '#00f0ff',
                    backgroundColor: 'rgba(0, 240, 255, 0.1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#00f0ff',
                    pointRadius: 3,
                    pointHoverRadius: 6,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, max: 60,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#64748b', font: { family: 'Rajdhani' } }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { display: false }
                    }
                },
                animation: { duration: 400, easing: 'linear' }
            }
        });

        // --- Variáveis de Estado ---
        let totals = { coca: 0, fanta: 0, sprite: 0, erro: 0 };
        const logContainer = document.getElementById('log-container');

        // --- Função para Atualizar a Interface com o JSON do Python ---
        function updateDashboard(data) {
            // Atualiza Contadores
            document.getElementById('count-coca').innerText = data.counts.coca;
            document.getElementById('count-fanta').innerText = data.counts.fanta;
            document.getElementById('count-sprite').innerText = data.counts.sprite;
            document.getElementById('count-error').innerText = data.counts.erro;

            // Atualiza Taxa
            document.getElementById('detection-rate').innerText = data.rate;

            // Atualiza Status da Esteira
            const statusEl = document.getElementById('belt-status');
            const gearIcon = document.getElementById('gear-icon');
            
            statusEl.innerText = data.status.toUpperCase();
            
            // Lógica visual baseada no status
            statusEl.className = 'text-2xl font-orbitron font-bold ';
            gearIcon.className = 'fa-solid fa-cogs text-3xl ';
            
            if (data.status === 'Processando' || data.status === 'Ligada') {
                statusEl.classList.add('text-glow-green');
                gearIcon.classList.add('text-glow-cyan', 'fa-spin'); // Faz a engrenagem girar
            } else if (data.status === 'Erro') {
                statusEl.classList.add('text-glow-red');
                gearIcon.classList.add('text-red-500');
            } else {
                statusEl.classList.add('text-glow-orange');
                gearIcon.classList.add('text-gray-500');
            }

            // Atualiza Gráfico
            const chartData = rateChart.data.datasets[0].data;
            chartData.push(data.rate);
            chartData.shift(); // Remove o mais antigo
            rateChart.update();

            // Atualiza Log (se houver um novo item detectado)
            if (data.last_item) {
                addLogEntry(data.last_item, data.accuracy);
            }
        }

        // --- Função para adicionar itens no Log ---
        function addLogEntry(item, accuracy) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            let colorClass = 'text-cyan-400';
            let icon = 'fa-check-circle';
            
            if (item.toLowerCase() === 'erro' || item.toLowerCase() === 'descarte') {
                colorClass = 'text-red-400';
                icon = 'fa-times-circle';
            }

            const logHTML = `
                <div class="flex items-center justify-between p-2 bg-gray-800/40 rounded border border-gray-700/50 animate-fade-in">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid ${icon} ${colorClass}"></i>
                        <span class="text-sm text-gray-200 font-bold">${item}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-gray-500">${time}</div>
                        <div class="text-xs text-cyan-500">${(accuracy * 100).toFixed(1)}%</div>
                    </div>
                </div>
            `;
            
            logContainer.insertAdjacentHTML('afterbegin', logHTML);
            
            // Mantém apenas os últimos 15 logs para não pesar a memória
            if (logContainer.children.length > 15) {
                logContainer.removeChild(logContainer.lastElementChild);
            }
        }

        // =====================================================================
        // SIMULAÇÃO DO BACKEND PYTHON (Remova ou comente essa parte na versão final)
        // =====================================================================
        const items = ['Coca-Cola', 'Fanta', 'Sprite', 'Coca-Cola', 'Sprite', 'Erro de Fabricação'];
        
        setInterval(() => {
            // Simulando a leitura de um novo item
            const isProcessing = Math.random() > 0.1; // 90% do tempo está processando
            let newItem = null;
            let accuracy = 0;

            if (isProcessing && Math.random() > 0.4) { // Gera itens aleatoriamente
                newItem = items[Math.floor(Math.random() * items.length)];
                accuracy = 0.85 + (Math.random() * 0.14); // Precisão entre 85% e 99%
                
                // Incrementa os totais simulados
                if (newItem === 'Coca-Cola') totals.coca++;
                else if (newItem === 'Fanta') totals.fanta++;
                else if (newItem === 'Sprite') totals.sprite++;
                else totals.erro++;
            }

            const mockJsonPayload = {
                counts: totals,
                status: isProcessing ? "Processando" : "Parada",
                rate: isProcessing ? Math.floor(Math.random() * (45 - 35 + 1) + 35) : 0, // Taxa entre 35 e 45
                last_item: newItem,
                accuracy: accuracy
            };

            updateDashboard(mockJsonPayload);
        }, 1500); // Atualiza a cada 1.5 segundos simulando o tempo da esteira

    </script>
</body>
</html>
